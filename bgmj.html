<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <title>Scroll Skyline Parallax (position-offset version)</title>
  <link rel="stylesheet" href="css/skyline_image.css">
  <script src="scripts/bgmj_script.js" defer></script>
</head>

<body>

  <div class="scene">
    <div class="reveal" id="revealBack">
      <div class="art art--back"></div>
    </div>
    <div class="reveal" id="revealMid">
      <div class="art art--mid"></div>
    </div>
    <div class="reveal" id="revealFront">
      <div class="art art--front"></div>
      <div class="characters character--1"></div>
    </div>
  </div>

  <div class="world">
  </div>

  <div class="content">
    <section>
      <div class="tag">Section 1</div>
      <h1>section 1</h1>
    </section>
    <section>
      <div class="tag">Section Two</div>
      <h1>section 2</h1>
    </section>
    <section>
      <div class="tag">Section 3</div>
      <h1>end</h1>
    </section>
  </div>


</body>

</html>
